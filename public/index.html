<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kapsul Waktu ku</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span class="logo">Kapsul Waktu</span>
  </header>

  <main>
    <div class="tabs">
      <button class="tab active" data-tab="kubur">Kubur</button>
      <button class="tab" data-tab="buka">Buka</button>
    </div>

    
    <section class="panel active" id="panel-kubur">
      <form id="form-kubur">
        <label for="pesan">Pesan</label>
        <textarea id="pesan" placeholder="Tulis pesanmu untuk masa depan..." rows="6" required></textarea>

        <label for="tanggal">Buka pada</label>
        <input id="tanggal" type="datetime-local" required />

        <button type="submit" id="btn-kubur">Kubur Kapsul</button>
      </form>

      <div class="result hidden" id="result-kubur">
        <p class="ok">Kapsul kamu berhasil dikubur!</p>
        <p class="label">Simpan ID ini:</p>
        <div class="id-row">
          <code id="result-id"></code>
          <button id="copy-btn">Salin</button>
        </div>
        <p class="warn">Tanpa ID, kapsul ini tidak bisa dibuka.</p>
      </div>
    </section>

    
    <section class="panel" id="panel-buka">
      <form id="form-buka">
        <label for="capsule-id">ID Kapsul</label>
        <input id="capsule-id" type="text" placeholder="Masukkan ID kapsul..." required />
        <button type="submit" id="btn-buka">Buka Kapsul</button>
      </form>

      <div class="result hidden" id="result-ok">
        <p class="ok">Kapsul terbuka!</p>
        <p class="label">Pesan:</p>
        <div class="message" id="isi-pesan"></div>
      </div>

      <div class="result hidden" id="result-lock">
        <p class="err">Kapsul masih terkunci</p>
        <p class="label">Bisa dibuka pada:</p>
        <p class="date" id="lock-date"></p>
        <p class="countdown" id="countdown"></p>
      </div>

      <div class="result hidden" id="result-err">
        <p class="err" id="err-msg"></p>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
